function haversine(lat1,lon1,lat2,lon2){
  const R=6371,dLat=(lat2-lat1)*Math.PI/180,dLon=(lon2-lon1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

    if(!res.ok)return null;
    const data=await res.json();
    if(!data.length)return null;
    return{lat:parseFloat(data[0].lat),lon:parseFloat(data[0].lon),display:data[0].display_name};
  }catch{return null;}
}
function calcularPrecioRuta(oCoords,dCoords,dDisplay,noc){
  const dOD=haversine(oCoords.lat,oCoords.lon,dCoords.lat,dCoords.lon);
  const dPD=haversine(PARADA.lat,PARADA.lon,dCoords.lat,dCoords.lon);
  // Urbano: destino dentro de Aranda de Duero O a menos de 4 km de la parada
  const destLow=dDisplay.toLowerCase();
  const esUrb=destLow.includes("aranda de duero")||destLow.includes("aranda")||dPD<4;
  if(esUrb){
    const kmUrb=Math.max(1,Math.ceil(dOD*1.20));
    // Urbano largo: estación de autobuses, polígono industrial, residencial, Santa Catalina, o >4 km
    const esLargo=destLow.includes("estaci")||destLow.includes("pol")
      ||destLow.includes("santa catalina")||kmUrb>4;
    const dP=esLargo?7:6,fP=esLargo?8:7;
    return{km:kmUrb,d:dP,f:fP,precio:noc?fP:dP,tipo:esLargo?"urbano_largo":"urbano",fijo:true,conReserva:false,label:esLargo?"🏙️ Urbano largo (tarifa fija)":"🏙️ Urbano corto (tarifa fija)"};
  }
  // Buscar coincidencia exacta por nombre en la lista de destinos
  const normDest=destLow.normalize("NFD").replace(/[\u0300-\u036f]/g,"");
  const exactMatch=DESTINOS_LISTA.find(d=>{
    const dn=d.n.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
    return normDest.includes(dn)||dn.includes(normDest.split(",")[0]);
  });
  if(exactMatch){
    const conReserva=exactMatch.km>=30;
    return{km:exactMatch.km,d:exactMatch.d,f:exactMatch.f,precio:noc?exactMatch.f:exactMatch.d,
      tipo:exactMatch.cat==="local"?"limitrofe":exactMatch.cat==="especial"?"especial":"interurbano",
      fijo:true,conReserva,label:"📍 Precio fijo",matchName:exactMatch.n};
  }
  // Coincidencia aproximada por distancia
  const kmRef=Math.ceil(dPD*1.15);
  const conReserva=kmRef>=30;
  const closeMatch=DESTINOS_LISTA.find(d=>d.km>=10&&Math.abs(d.km-kmRef)<=10);
  if(closeMatch){
    return{km:closeMatch.km,d:closeMatch.d,f:closeMatch.f,precio:noc?closeMatch.f:closeMatch.d,
      tipo:closeMatch.cat==="local"?"limitrofe":"interurbano",
      fijo:closeMatch.cat==="local"||closeMatch.cat==="especial",conReserva,
      label:closeMatch.cat==="local"?"📍 Limítrofe (fijo)":"🗺️ Precio orientativo",matchName:closeMatch.n};
  }
  const rate=noc?T.noc.km:T.dia.km;
  const minP=noc?T.noc.min:T.dia.min;
  const precio=Math.max(minP,kmRef*2*rate);
  return{km:kmRef,d:Math.round(Math.max(T.dia.min,kmRef*2*T.dia.km)),f:Math.round(Math.max(T.noc.min,kmRef*2*T.noc.km)),
    precio:Math.round(precio*100)/100,tipo:kmRef<30?"limitrofe":"interurbano",fijo:false,conReserva,
    label:kmRef<30?"📍 Limítrofe":"🗺️ Precio orientativo"};
}
function getMetodosPago(importe){
  if(importe<=10)return[["efectivo","💵 Efectivo al conductor"],["bizum","📱 Bizum · "+EMPRESA.telFmt],["tarjeta","💳 Tarjeta"]];
  return[["bizum","📱 Bizum · "+EMPRESA.telFmt],["tarjeta","💳 Tarjeta"]];
}
function asignarConductor(km,pax,precio,tipo){
  const esUrb=tipo==="urbano"||tipo==="urbano_largo";
  const v=VEHICULOS.filter(v=>{
    if(esUrb&&!v.urbano)return false;           // Solo Megane para urbanos
    if(km*2>v.maxKmRT)return false;             // Límite de km del ID4
    if(v.minPrecio>0&&precio<v.minPrecio)return false; // Mercedes mín 100€
    if(pax>v.plazas)return false;
    return true;
  });
  if(!v.length)return null;
  return{conductor:CONDUCTORES[Math.floor(Math.random()*CONDUCTORES.length)],vehiculo:v[0],eta:5};
}

                  <p style={{color:"#6b7280",fontSize:11}}>{precioCalc.km} km · {noc?"🌙 Nocturna":"☀️ Diurna"}{!precioCalc.fijo?" · El conductor confirma el precio":""}</p>
                  {precioCalc.matchName&&<p style={{color:"#86efac",fontSize:11}}>Coincide con tarifa de {precioCalc.matchName}</p>}
                  {(precioCalc.tipo==="urbano"||precioCalc.tipo==="urbano_largo")&&<p style={{color:"#86efac",fontSize:11}}>Solo inmediato — sin reserva</p>}
                </div>
                <p style={{color:"#FFD700",fontWeight:900,fontSize:28,marginLeft:12}}>{noc?precioCalc.f:precioCalc.d}€</p>
              </div>
            </div>
          )}
        </Card>
        {destinoSugs.length>0&&!bk.destinoObj&&(
          <div style={{background:"#2a2a2a",border:"1px solid #374151",borderTop:"none",borderRadius:"0 0 12px 12px",overflow:"hidden"}}>
            {destinoSugs.map(d=>(
              <button key={d.n} onClick={()=>selectDestinoLista(d)} style={{display:"flex",justifyContent:"space-between",alignItems:"center",width:"100%",padding:"10px 14px",background:"transparent",border:"none",borderBottom:"1px solid #374151",cursor:"pointer",textAlign:"left"}}>
                <div><p style={{color:"white",fontWeight:600,fontSize:13}}>{d.n}</p><p style={{color:"#6b7280",fontSize:11}}>{d.km} km · {d.cat==="local"?"precio fijo":"orientativo"}</p></div>
                <p style={{color:"#FFD700",fontWeight:800,fontSize:15,marginLeft:12}}>{noc?d.f:d.d}€</p>
              </button>
            ))}
          </div>
        )}
      </div>
      <Card><SL>Pasajeros y equipaje</SL>
        {[["Pasajeros","pasajeros",1,7,"👤"],["Bultos","bultos",0,10,"🧳"]].map(([lbl,key,mn,mx,ico])=>(
          <div key={key} style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:key==="pasajeros"?12:0}}>
            <div><p style={{color:"white",fontSize:14}}>{ico} {lbl}</p>{key==="bultos"&&<p style={{color:"#555",fontSize:11}}>3 incluidos · 0,50€/extra</p>}</div>
            <div style={{display:"flex",alignItems:"center",gap:14}}>
              <Btn onClick={()=>setBk(b=>({...b,[key]:Math.max(mn,b[key]-1)}))} style={{width:34,height:34,borderRadius:"50%",background:"#2a2a2a",color:"white",fontSize:18,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center"}}>−</Btn>
              <span style={{color:"white",fontWeight:900,fontSize:18,minWidth:20,textAlign:"center"}}>{bk[key]}</span>
              <Btn onClick={()=>setBk(b=>({...b,[key]:Math.min(mx,b[key]+1)}))} style={{width:34,height:34,borderRadius:"50%",background:"#FFD700",color:"#111",fontSize:18,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center"}}>+</Btn>
            </div>
          </div>
        ))}
        {bk.bultos>3&&<p style={{color:"#FFD700",fontSize:12,marginTop:6}}>+{((bk.bultos-3)*0.5).toFixed(2)}€ por {bk.bultos-3} bulto{bk.bultos-3>1?"s":""} extra</p>}
      </Card>
      {precioCalc&&!lim&&(
        <Card><SL>¿Cuándo?</SL>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            {[["ahora","🕐 Ahora"],["reserva","📅 Reservar"]].map(([v,l])=>(
              <Btn key={v} onClick={()=>setBk(b=>({...b,cuando:v}))} style={{background:bk.cuando===v?"#FFD700":"#2a2a2a",color:bk.cuando===v?"#111":"#d1d5db",fontWeight:700,padding:"11px 0",borderRadius:10,fontSize:13}}>{l}</Btn>
            ))}
          </div>
          {bk.cuando==="reserva"&&<>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginTop:10}}>
              <input type="date" value={bk.fecha} min={new Date().toISOString().split("T")[0]} onChange={e=>setBk(b=>({...b,fecha:e.target.value}))} style={{background:"#2a2a2a",color:"white",border:"1px solid #374151",borderRadius:8,padding:"8px 10px",fontSize:13,outline:"none"}}/>
              <input type="time" value={bk.hora} onChange={e=>setBk(b=>({...b,hora:e.target.value}))} style={{background:"#2a2a2a",color:"white",border:"1px solid #374151",borderRadius:8,padding:"8px 10px",fontSize:13,outline:"none"}}/>
            </div>
            <InfoBox color="#2a1a00" border="#4a3000" tc="#fb923c">Requiere aprobación y pago previo. El conductor puede modificar el precio.</InfoBox>
          </>}
        </Card>
      )}
      <Card><SL>Notas (opcional)</SL>
        <input type="text" placeholder="Paradas intermedias, necesidades especiales..." value={bk.notas} onChange={e=>setBk(b=>({...b,notas:e.target.value}))} style={{width:"100%",background:"#2a2a2a",color:"white",border:"1px solid #374151",borderRadius:8,padding:"10px 12px",fontSize:13,outline:"none"}}/>
      </Card>
    </div>
    <div style={{background:"#111",borderTop:"1px solid #1f2937",padding:16}}>
      {precioCalc&&<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <div><p style={{color:"#9ca3af",fontSize:13}}>Precio {precioCalc.fijo?"fijo":"estimado"}:</p><p style={{color:"#555",fontSize:11}}>{noc?"🌙 Nocturna":"☀️ Diurna"}</p></div>
        <p style={{color:"#FFD700",fontWeight:900,fontSize:30}}>{total.toFixed(2)}€</p>
      </div>}
      <Btn onClick={()=>{if(!bk.origen.trim()){alert("Indica tu punto de recogida");return;}if(!bk.destinoObj){if(origenCoords&&destinoCoords){tryCalcPrecio(origenCoords,destinoCoords,destinoCoords.display);}else{alert("Introduce el destino y espera la verificación automática");return;}}go("pagar");}}
        style={{width:"100%",background:precioCalc?"#FFD700":"#2a2a2a",color:precioCalc?"#111":"#9ca3af",fontWeight:800,fontSize:17,padding:"15px 0",borderRadius:12}}>
        {precioCalc?"Continuar — "+total.toFixed(2)+" €":"Introduce origen y destino"}
      </Btn>
    </div>
  </div>);

  // ── CONFIRMAR SOLICITUD (antes "pagar")
  if(sc==="pagar") return(<div style={{background:"#0a0a0a",minHeight:"100vh",maxWidth:420,margin:"0 auto",display:"flex",flexDirection:"column"}}>
    <Hdr title="Confirmar solicitud" back="booking_form" go={go}/>
    <div style={{flex:1,overflowY:"auto",padding:16,display:"flex",flexDirection:"column",gap:12}}>
      <Card>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div style={{flex:1}}>
            <p style={{color:"#555",fontSize:11,marginBottom:3}}>📍 {bk.origen||PARADA.nombre}</p>
            <p style={{color:"white",fontWeight:700,fontSize:15}}>🏁 {bk.destino}</p>
            <p style={{color:"#9ca3af",fontSize:12,marginTop:4}}>{precioCalc?.km?precioCalc.km+" km · ":""}{noc?"🌙 Nocturna":"☀️ Diurna"} · {bk.pasajeros} pax · {bk.bultos} bultos</p>
            {bk.cuando==="reserva"&&bk.fecha&&<p style={{color:"#FFD700",fontSize:12,marginTop:3}}>📅 {bk.fecha}{bk.hora?" · "+bk.hora+"h":""}</p>}
            {bk.notas?<p style={{color:"#6b7280",fontSize:12,marginTop:3}}>📝 {bk.notas}</p>:null}
          </div>
          <div style={{textAlign:"right",marginLeft:12}}>
            <p style={{color:"#FFD700",fontWeight:900,fontSize:28}}>{total.toFixed(2)}€</p>
            {!precioCalc?.fijo&&<p style={{color:"#fb923c",fontSize:10}}>Orientativo</p>}
          </div>
        </div>
      </Card>
      <Card style={{display:"flex",flexDirection:"column",gap:10}}>
        <SL>Tus datos de contacto</SL>
        <input type="text" placeholder="Nombre completo *" value={bk.nombre} onChange={e=>setBk(b=>({...b,nombre:e.target.value}))} style={{background:"#2a2a2a",color:"white",border:"1px solid #374151",borderRadius:10,padding:"12px 14px",fontSize:14,outline:"none",width:"100%"}}/>
        <input type="tel" placeholder="Teléfono de contacto *" value={bk.telefono} onChange={e=>setBk(b=>({...b,telefono:e.target.value}))} style={{background:"#2a2a2a",color:"white",border:"1px solid #374151",borderRadius:10,padding:"12px 14px",fontSize:14,outline:"none",width:"100%"}}/>
      </Card>
      <InfoBox color="#1e1b00" border="#4a4000" tc="#fbbf24">
        El conductor revisará el precio y te confirmará el importe exacto antes de iniciar el servicio. El pago se realizará tras la aceptación.
      </InfoBox>
      {bk.cuando==="reserva"&&<Card><SL>Política de cancelación</SL>
        <p style={{color:"#86efac",fontSize:12,marginBottom:3}}>✅ Cancelación con +7 días → reembolso del 70%</p>
        <p style={{color:"#f87171",fontSize:12}}>❌ Cancelación ≤7 días → sin reembolso (100% retenido)</p>
        <p style={{color:"#555",fontSize:11,marginTop:6}}>Las reservas deben abonarse con antelación a la prestación del servicio.</p>
      </Card>}
    </div>
    <div style={{background:"#111",borderTop:"1px solid #1f2937",padding:16}}>
      <Btn onClick={()=>{
        if(!bk.nombre.trim()||!bk.telefono.trim()){alert("Introduce tu nombre y teléfono de contacto");return;}
        // Write request to localStorage for driver panel
        try{localStorage.setItem("taxiReq",JSON.stringify({origen:bk.origen||PARADA.nombre,destino:bk.destino,km:precioCalc?.km,precio:total,tipo:precioCalc?.tipo,pasajeros:bk.pasajeros,bultos:bk.bultos,notas:bk.notas,nombre:bk.nombre,telefono:bk.telefono,cuando:bk.cuando,ts:Date.now()}));}catch(e){}
        setAsignacion(null);setPrecioConfirmado(null);setEtaConfirmado(null);go("buscando");
      }} style={{width:"100%",background:"#FFD700",color:"#111",fontWeight:800,fontSize:17,padding:"15px 0",borderRadius:12}}>
        🚕 Enviar solicitud — {total.toFixed(2)} €
      </Btn>
    </div>
  </div>);

  // ── BUSCANDO → OFERTA CONDUCTOR → PAGO
  if(sc==="buscando"){
    const precioFinal=precioConfirmado??total;
    const metodosPagoFinal=getMetodosPago(precioFinal);
    // Phase 1: searching
    if(!asignacion) return(<div style={{background:"#0a0a0a",minHeight:"100vh",maxWidth:420,margin:"0 auto",display:"flex",flexDirection:"column",justifyContent:"center",alignItems:"center",padding:32,textAlign:"center"}}>
      <div style={{fontSize:64,marginBottom:20,animation:"pulse 1.5s ease infinite"}}>🚕</div>
      <style>{`@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}`}</style>
      <p style={{color:"white",fontWeight:800,fontSize:22,marginBottom:8}}>Buscando tu taxi más próximo</p>
      <p style={{color:"#9ca3af",fontSize:14,marginBottom:20}}>Conectando con conductores en la zona...</p>
      <div style={{display:"flex",gap:6,marginBottom:24}}>{[0,1,2].map(i=><div key={i} style={{width:8,height:8,borderRadius:"50%",background:"#FFD700",animation:`dot ${1.2}s ease ${i*0.4}s infinite`,opacity:.3}}/>)}</div>
      <style>{`@keyframes dot{0%,80%,100%{opacity:.3;transform:scale(.8)}40%{opacity:1;transform:scale(1.2)}}`}</style>
      <div style={{background:"#1a1a1a",border:"1px solid #2a2a2a",borderRadius:12,padding:"14px 16px",width:"100%",maxWidth:320,marginBottom:20}}>
        <p style={{color:"#555",fontSize:11,marginBottom:6}}>📍 {bk.origen||PARADA.nombre}</p>
        <p style={{color:"white",fontWeight:700}}>🏁 {bk.destino}</p>
        <p style={{color:"#9ca3af",fontSize:12,marginTop:4}}>{total.toFixed(2)} € · {bk.pasajeros} pax</p>
      </div>
      <Btn onClick={()=>go("home")} style={{color:"#555",background:"none",border:"1px solid #2a2a2a",borderRadius:10,padding:"10px 24px",fontSize:13}}>Cancelar búsqueda</Btn>
    </div>);
    // Phase 2: driver confirmed — show offer to client
    if(!bk.pago) return(<div style={{background:"#0a0a0a",minHeight:"100vh",maxWidth:420,margin:"0 auto",display:"flex",flexDirection:"column"}}>
      <Hdr title="¡Taxi encontrado!" go={go}/>
      <div style={{flex:1,overflowY:"auto",padding:16,display:"flex",flexDirection:"column",gap:12}}>
        <div style={{display:"flex",alignItems:"center",gap:14,background:"#1a1a1a",border:"2px solid #FFD700",borderRadius:14,padding:16}}>
          <div style={{width:54,height:54,background:"#FFD700",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,fontSize:19,flexShrink:0}}>{asignacion.conductor.ini}</div>
          <div style={{flex:1}}>
            <p style={{color:"white",fontWeight:700,fontSize:15}}>{asignacion.conductor.nombre}</p>
            <p style={{color:"#9ca3af",fontSize:12,marginTop:2}}>{asignacion.vehiculo.marca}</p>
            <p style={{color:"#555",fontSize:11}}>Matrícula: {asignacion.vehiculo.mat} · {asignacion.vehiculo.eco}</p>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{background:"#0a2a1a",border:"1px solid #065f46",borderRadius:8,padding:"6px 12px"}}>
              <p style={{color:"#4ade80",fontWeight:900,fontSize:16}}>🕐 {etaConfirmado||asignacion.eta+" min"}</p>
            </div>
          </div>
        </div>
        <Card>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
            <div style={{width:10,height:10,borderRadius:"50%",background:"#22c55e",flexShrink:0}}/>
            <p style={{color:"#9ca3af",fontSize:11}}>Recogida</p>
            <p style={{color:"white",fontSize:13,flex:1,textAlign:"right"}}>{bk.origen||PARADA.nombre}</p>
          </div>
          <div style={{marginLeft:4,width:2,height:16,background:"#2a2a2a",marginBottom:8}}/>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
            <div style={{width:10,height:10,borderRadius:"50%",background:"#ef4444",flexShrink:0}}/>
            <p style={{color:"#9ca3af",fontSize:11}}>Destino</p>
            <p style={{color:"white",fontSize:13,flex:1,textAlign:"right"}}>{bk.destino}</p>
          </div>
          <div style={{borderTop:"1px solid #2a2a2a",paddingTop:10,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <p style={{color:"#555",fontSize:11}}>{bk.pasajeros} pasajeros · {bk.bultos} bultos</p>
              {!precioCalc?.fijo&&<p style={{color:"#fb923c",fontSize:10,marginTop:2}}>Precio confirmado por el conductor</p>}
            </div>
            <p style={{color:"#FFD700",fontWeight:900,fontSize:32}}>{precioFinal.toFixed(2)}€</p>
          </div>
        </Card>
        {precioFinal>10&&<InfoBox color="#2a1a00" border="#4a3000" tc="#fb923c">Importe superior a 10€: pago previo por Bizum o tarjeta, antes de la salida del taxi.</InfoBox>}
        {precioFinal<=10&&<InfoBox>Importe ≤10€: puedes pagar en efectivo, Bizum o tarjeta.</InfoBox>}
        <Card>
          <SL>Selecciona el método de pago</SL>
          {metodosPagoFinal.map(([id,lbl])=>(
            <Btn key={id} onClick={()=>setBk(b=>({...b,pago:id}))} style={{width:"100%",display:"flex",alignItems:"center",gap:10,padding:"12px",borderRadius:10,border:"1px solid "+(bk.pago===id?"#FFD700":"#374151"),background:bk.pago===id?"rgba(255,215,0,0.08)":"transparent",marginBottom:6}}>
              <div style={{width:18,height:18,borderRadius:"50%",border:"2px solid "+(bk.pago===id?"#FFD700":"#555"),display:"flex",alignItems:"center",justifyContent:"center"}}>
                {bk.pago===id&&<div style={{width:9,height:9,borderRadius:"50%",background:"#FFD700"}}/>}
              </div>
              <span style={{color:bk.pago===id?"#FFD700":"#d1d5db",fontWeight:600,fontSize:14}}>{lbl}</span>
            </Btn>
          ))}
        </Card>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <Btn onClick={()=>{go("home");}} style={{background:"#1a1a1a",color:"#9ca3af",fontWeight:700,padding:"15px 0",borderRadius:12,border:"1px solid #2a2a2a",fontSize:15}}>✕ Rechazar</Btn>
          <Btn onClick={()=>{if(!bk.pago){alert("Selecciona el método de pago");return;}go("buscando_pago");}} style={{background:"#FFD700",color:"#111",fontWeight:800,padding:"15px 0",borderRadius:12,fontSize:15}}>✓ Aceptar</Btn>
        </div>
      </div>
    </div>);
    return null;
  }

  // ── PANTALLA PAGO (tras aceptar oferta)
  if(sc==="buscando_pago"){
    const precioFinal=precioConfirmado??total;
    return(<div style={{background:"#0a0a0a",minHeight:"100vh",maxWidth:420,margin:"0 auto",display:"flex",flexDirection:"column"}}>
      <Hdr title={bk.pago==="efectivo"?"Pago en efectivo":bk.pago==="bizum"?"Pagar con Bizum":"Pagar con tarjeta"} back="buscando" go={go}/>
      <div style={{flex:1,overflowY:"auto",padding:16,display:"flex",flexDirection:"column",gap:14}}>
        <div style={{textAlign:"center",padding:"8px 0"}}>
          <p style={{color:"#FFD700",fontWeight:900,fontSize:48}}>{precioFinal.toFixed(2)} €</p>
          <p style={{color:"#9ca3af",fontSize:13}}>🏁 {bk.destino}</p>
        </div>
        {bk.pago==="efectivo"&&<>
          <Card style={{textAlign:"center",padding:20}}>
            <div style={{fontSize:52,marginBottom:12}}>💵</div>
            <p style={{color:"white",fontWeight:700,fontSize:18}}>Pago en efectivo al conductor</p>
            <p style={{color:"#9ca3af",fontSize:13,marginTop:8}}>Entrega exactamente <strong style={{color:"#FFD700"}}>{precioFinal.toFixed(2)} €</strong> al conductor al llegar a tu destino.</p>
          </Card>
          <Btn onClick={()=>{setTrackProgress(0);setTrackEta(8);go("tracking");}} style={{background:"#FFD700",color:"#111",fontWeight:800,fontSize:16,padding:"16px 0",borderRadius:12,width:"100%"}}>Confirmar · Iniciar seguimiento 🗺️</Btn>
        </>}
        {bk.pago==="bizum"&&<>
          <Card style={{textAlign:"center",padding:20}}>
            <div style={{fontSize:48,marginBottom:8}}>📱</div>
            <p style={{color:"#9ca3af",fontSize:13,marginBottom:6}}>Envía el pago a este número de Bizum:</p>
            <p style={{color:"#FFD700",fontWeight:900,fontSize:32,letterSpacing:3}}>{EMPRESA.telFmt}</p>
            <p style={{color:"white",fontWeight:900,fontSize:36,margin:"10px 0"}}>{precioFinal.toFixed(2)} €</p>
            <p style={{color:"#555",fontSize:12}}>Concepto: TAXI · {bk.nombre}</p>
          </Card>
          <a href="bizum://" style={{display:"block",background:"#0070D1",color:"white",fontWeight:800,fontSize:16,padding:"16px 0",borderRadius:12,textAlign:"center",textDecoration:"none"}}>📱 Abrir Bizum</a>
          <Btn onClick={()=>{setTrackProgress(0);setTrackEta(asignacion?.eta||8);go("tracking");}} style={{width:"100%",background:"#FFD700",color:"#111",fontWeight:800,fontSize:16,padding:"14px 0",borderRadius:12}}>✓ Ya he pagado · Ver seguimiento</Btn>
        </>}
        {bk.pago==="tarjeta"&&<>
          <Card>
            <SL>Datos de la tarjeta</SL>
            <input type="text" placeholder="Número de tarjeta" maxLength="19" style={{width:"100%",background:"#2a2a2a",color:"white",border:"1px solid #374151",borderRadius:10,padding:"12px",fontSize:15,outline:"none",marginBottom:10,letterSpacing:2}} onInput={e=>{e.target.value=e.target.value.replace(/\D/g,"").replace(/(.{4})/g,"$1 ").trim().substring(0,19);}}/>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <input type="text" placeholder="MM/AA" maxLength="5" style={{background:"#2a2a2a",color:"white",border:"1px solid #374151",borderRadius:10,padding:"12px",fontSize:14,outline:"none"}}/>
              <input type="text" placeholder="CVV" maxLength="3" style={{background:"#2a2a2a",color:"white",border:"1px solid #374151",borderRadius:10,padding:"12px",fontSize:14,outline:"none"}}/>
            </div>
          </Card>
          <InfoBox color="#1a2a1a" border="#2d5a2d" tc="#86efac">🔒 Pago seguro. En producción se integra con Stripe o Redsys.</InfoBox>
          <Btn onClick={()=>{setTrackProgress(0);setTrackEta(asignacion?.eta||8);go("tracking");}} style={{width:"100%",background:"#FFD700",color:"#111",fontWeight:800,fontSize:17,padding:"16px 0",borderRadius:12}}>💳 Pagar {precioFinal.toFixed(2)} € · Ver seguimiento</Btn>
        </>}
      </div>
    </div>);
  }

  // ── TRACKING
  if(sc==="tracking") return(<div style={{background:"#0a0a0a",minHeight:"100vh",maxWidth:420,margin:"0 auto",display:"flex",flexDirection:"column"}}>
    <Hdr title="Seguimiento en tiempo real" back="home" go={go}/>
    <div style={{height:260,background:"#1a2030",position:"relative",overflow:"hidden"}}>
      {[0,1,2,3,4].map(i=><div key={i} style={{position:"absolute",top:0,bottom:0,left:i*25+"%",width:1,background:"rgba(255,255,255,0.05)"}}/>)}
      {[0,1,2,3,4].map(i=><div key={i} style={{position:"absolute",left:0,right:0,top:i*25+"%",height:1,background:"rgba(255,255,255,0.05)"}}/>)}
      <div style={{position:"absolute",top:"40%",left:0,right:0,height:4,background:"rgba(255,255,255,0.08)"}}/>
      <div style={{position:"absolute",top:"calc(40% - 14px)",left:(8+trackProgress*0.5)+"%",fontSize:26,transition:"left 1s linear",filter:"drop-shadow(0 0 8px #FFD700)"}}>🚕</div>
      <div style={{position:"absolute",top:"calc(40% - 18px)",right:"8%",fontSize:26}}>📍</div>
      <div style={{position:"absolute",top:"calc(40% - 12px)",left:"8%",width:18,height:18,borderRadius:"50%",background:"#3b82f6",border:"3px solid white",boxShadow:"0 0 10px #3b82f6"}}/>
      {trackProgress>=100&&<div style={{position:"absolute",inset:0,background:"rgba(0,200,100,0.2)",display:"flex",alignItems:"center",justifyContent:"center"}}><div style={{background:"#15803d",borderRadius:12,padding:"12px 24px"}}><p style={{color:"white",fontWeight:900,fontSize:17}}>🎉 ¡Conductor llegado!</p></div></div>}
      <div style={{position:"absolute",bottom:8,left:10,background:"rgba(0,0,0,0.7)",borderRadius:8,padding:"3px 8px"}}><p style={{color:"#93c5fd",fontSize:10,fontWeight:700}}>🔵 Tu posición</p></div>
      <div style={{position:"absolute",bottom:8,right:10,background:"rgba(0,0,0,0.7)",borderRadius:8,padding:"3px 8px"}}><p style={{color:"#f87171",fontSize:10,fontWeight:700}}>📍 Destino</p></div>
    </div>
    <div style={{flex:1,padding:16,display:"flex",flexDirection:"column",gap:12}}>
      <Card style={{border:"1px solid "+(trackProgress>=100?"#16a34a":"#2a2a2a")}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <p style={{color:"#555",fontSize:11,textTransform:"uppercase",letterSpacing:1}}>{trackProgress>=100?"LLEGADO":"EN CAMINO"}</p>
          <span style={{background:trackProgress>=100?"#16a34a":"#1e3a5f",color:trackProgress>=100?"#86efac":"#93c5fd",padding:"3px 10px",borderRadius:20,fontSize:12,fontWeight:700}}>{trackProgress>=100?"¡Llegó!":Math.ceil(trackEta)+" min"}</span>
        </div>
        <div style={{background:"#2a2a2a",borderRadius:4,height:6,marginBottom:10,overflow:"hidden"}}>
          <div style={{width:trackProgress+"%",height:"100%",background:trackProgress>=100?"#4ade80":"#FFD700",transition:"width 1s linear"}}/>
        </div>
        {asignacion&&<div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:40,height:40,background:"#FFD700",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,fontSize:13,flexShrink:0}}>{asignacion.conductor.ini}</div>
          <div><p style={{color:"white",fontWeight:700,fontSize:13}}>{asignacion.conductor.nombre}</p><p style={{color:"#9ca3af",fontSize:11}}>{asignacion.vehiculo.marca} · {asignacion.vehiculo.mat}</p></div>
        </div>}
      </Card>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <Btn onClick={()=>go("cliente_chat")} style={{background:"#1e3a5f",color:"#93c5fd",fontWeight:700,padding:"12px 0",borderRadius:12,fontSize:13}}>💬 Chat conductor</Btn>
        <Btn onClick={()=>go("home")} style={{background:"#1a1a1a",color:"#9ca3af",fontWeight:600,padding:"12px 0",borderRadius:12,border:"1px solid #2a2a2a",fontSize:13}}>Volver</Btn>
      </div>
    </div>
  </div>);

  // ── EN TAXI
  if(sc==="en_taxi") return(<div style={{background:"#0a0a0a",minHeight:"100vh",maxWidth:420,margin:"0 auto",display:"flex",flexDirection:"column"}}>
    <Hdr title="Pago en taxi" back="home" go={go}/>
    <div style={{flex:1,padding:20,display:"flex",flexDirection:"column",gap:14}}>
      <div style={{textAlign:"center",padding:"16px 0"}}><div style={{fontSize:52,marginBottom:10}}>🚕</div><p style={{color:"white",fontWeight:700,fontSize:17}}>¿Cuánto te ha indicado el conductor?</p></div>
      <Card><SL>Importe del servicio</SL>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <input type="number" step="0.01" placeholder="0,00" value={importeEnTaxi} onChange={e=>setImporteEnTaxi(e.target.value)} style={{flex:1,background:"#2a2a2a",color:"white",border:"1px solid #374151",borderRadius:10,padding:"16px",fontSize:28,outline:"none",textAlign:"right"}}/>
          <span style={{color:"#FFD700",fontWeight:900,fontSize:28}}>€</span>
        </div>
      </Card>
      {importeEnTaxi&&parseFloat(importeEnTaxi)>0&&(<Card>
        <SL>Método de pago</SL>
        {parseFloat(importeEnTaxi)>10&&<InfoBox color="#2a1a00" border="#4a3000" tc="#fb923c">Importe superior a 10€: solo Bizum o tarjeta.</InfoBox>}
        <div style={{marginTop:8}}>
          {getMetodosPago(parseFloat(importeEnTaxi)).map(([id,lbl])=>(
            <Btn key={id} onClick={()=>setPagoEnTaxi(id)} style={{width:"100%",display:"flex",alignItems:"center",gap:10,padding:"12px",borderRadius:10,border:"1px solid "+(pagoEnTaxi===id?"#FFD700":"#374151"),background:pagoEnTaxi===id?"rgba(255,215,0,0.08)":"transparent",marginBottom:6}}>
              <div style={{width:18,height:18,borderRadius:"50%",border:"2px solid "+(pagoEnTaxi===id?"#FFD700":"#555"),display:"flex",alignItems:"center",justifyContent:"center"}}>
                {pagoEnTaxi===id&&<div style={{width:9,height:9,borderRadius:"50%",background:"#FFD700"}}/>}
              </div>
              <span style={{color:pagoEnTaxi===id?"#FFD700":"#d1d5db",fontWeight:600,fontSize:14}}>{lbl}</span>
            </Btn>
          ))}
        </div>
      </Card>)}
      {pagoEnTaxi&&<Btn onClick={()=>go("pago_taxi")} style={{width:"100%",background:"#FFD700",color:"#111",fontWeight:800,fontSize:17,padding:"16px 0",borderRadius:12}}>Pagar {parseFloat(importeEnTaxi).toFixed(2)} € →</Btn>}
    </div>
  </div>);

  // ── PAGO TAXI
  if(sc==="pago_taxi") return(<div style={{background:"#0a0a0a",minHeight:"100vh",maxWidth:420,margin:"0 auto",display:"flex",flexDirection:"column"}}>
    <Hdr title={pagoEnTaxi==="bizum"?"Pagar con Bizum":pagoEnTaxi==="tarjeta"?"Pagar con tarjeta":"Efectivo"} back="en_taxi" go={go}/>
    <div style={{flex:1,padding:20,display:"flex",flexDirection:"column",gap:14}}>
      {pagoEnTaxi==="efectivo"&&<div style={{textAlign:"center",padding:"30px 0"}}>
        <div style={{fontSize:64,marginBottom:16}}>💵</div>
        <p style={{color:"white",fontWeight:700,fontSize:22}}>Entrega {parseFloat(importeEnTaxi).toFixed(2)} €</p>
        <p style={{color:"#9ca3af",marginTop:8}}>al conductor directamente</p>
        <Btn onClick={()=>go("home")} style={{background:"#FFD700",color:"#111",fontWeight:800,fontSize:16,padding:"14px 32px",borderRadius:12,marginTop:24}}>✓ Confirmar</Btn>
      </div>}
      {pagoEnTaxi==="bizum"&&<div>
        <Card style={{textAlign:"center",padding:20}}>
          <p style={{color:"#9ca3af",fontSize:13,marginBottom:8}}>Envía el pago por Bizum a:</p>
          <p style={{color:"#FFD700",fontWeight:900,fontSize:32,letterSpacing:3}}>{EMPRESA.telFmt}</p>
          <p style={{color:"white",fontWeight:900,fontSize:40,marginTop:8}}>{parseFloat(importeEnTaxi).toFixed(2)} €</p>
          <p style={{color:"#555",fontSize:12,marginTop:4}}>Concepto: TAXI</p>
        </Card>
        <a href="bizum://" style={{display:"block",background:"#0070D1",color:"white",fontWeight:800,fontSize:16,padding:"16px 0",borderRadius:12,textAlign:"center",textDecoration:"none",marginTop:12}}>📱 Abrir Bizum</a>
        <Btn onClick={()=>go("home")} style={{width:"100%",background:"#1a1a1a",color:"#9ca3af",fontWeight:600,padding:"12px 0",borderRadius:12,border:"1px solid #2a2a2a",marginTop:8,fontSize:14}}>✓ Ya he pagado</Btn>
      </div>}
      {pagoEnTaxi==="tarjeta"&&<div>
        <Card><SL>Datos de la tarjeta</SL>
          <input type="text" placeholder="Número de tarjeta" maxLength="19" style={{width:"100%",background:"#2a2a2a",color:"white",border:"1px solid #374151",borderRadius:10,padding:"12px",fontSize:16,outline:"none",marginBottom:10,letterSpacing:2}}/>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <input type="text" placeholder="MM/AA" maxLength="5" style={{background:"#2a2a2a",color:"white",border:"1px solid #374151",borderRadius:10,padding:"12px",fontSize:14,outline:"none"}}/>
            <input type="text" placeholder="CVV" maxLength="3" style={{background:"#2a2a2a",color:"white",border:"1px solid #374151",borderRadius:10,padding:"12px",fontSize:14,outline:"none"}}/>
          </div>
        </Card>
        <InfoBox color="#1a2a1a" border="#2d5a2d" tc="#86efac">En producción: integración con Stripe o Redsys.</InfoBox>
        <Btn onClick={()=>go("home")} style={{width:"100%",background:"#FFD700",color:"#111",fontWeight:800,fontSize:17,padding:"16px 0",borderRadius:12,marginTop:12}}>💳 Pagar {parseFloat(importeEnTaxi).toFixed(2)} €</Btn>
      </div>}
    </div>
  </div>);

  // ── CHAT CLIENTE
  if(sc==="cliente_chat") return(<div style={{background:"#0a0a0a",minHeight:"100vh",maxWidth:420,margin:"0 auto",display:"flex",flexDirection:"column"}}>
    <Hdr title="Chat con el conductor" back="home" go={go}/>
    <div style={{background:"#1a2030",padding:"6px 16px",textAlign:"center"}}><p style={{color:"#9ca3af",fontSize:12}}>Los mensajes llegan directamente al conductor asignado</p></div>
    <div style={{flex:1,overflow:"auto",padding:16,display:"flex",flexDirection:"column",gap:8}}>
      {chatMsgs.map((m,i)=>(<div key={i} style={{display:"flex",justifyContent:m.from==="cliente"?"flex-end":m.from==="sistema"?"center":"flex-start"}}>
        {m.from==="sistema"?<p style={{color:"#555",fontSize:11,background:"#1a1a1a",padding:"4px 10px",borderRadius:10}}>{m.texto}</p>:(
          <div style={{maxWidth:"75%",background:m.from==="cliente"?"#FFD700":"#1a1a1a",borderRadius:14,padding:"10px 12px"}}>
            <p style={{color:m.from==="cliente"?"#111":"white",fontSize:14}}>{m.texto}</p>
            <p style={{color:m.from==="cliente"?"#555":"#6b7280",fontSize:10,marginTop:3,textAlign:"right"}}>{m.hora}</p>
          </div>
        )}
      </div>))}
      <div ref={chatEndRef}/>
    </div>
    <div style={{background:"#111",borderTop:"1px solid #1f2937",padding:12,display:"flex",gap:10}}>
      <input type="text" placeholder="Escribe un mensaje al conductor..." value={chatInput} onChange={e=>setChatInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&enviarChat("cliente")} style={{flex:1,background:"#2a2a2a",color:"white",border:"1px solid #374151",borderRadius:24,padding:"10px 16px",fontSize:14,outline:"none"}}/>
      <Btn onClick={()=>enviarChat("cliente")} style={{background:"#FFD700",color:"#111",width:44,height:44,borderRadius:"50%",fontWeight:900,fontSize:18,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>→</Btn>
    </div>
  </div>);

  // ── DRIVER LOGIN
  if(sc==="driver_login") return(<div style={{background:"#0a0a0a",minHeight:"100vh",maxWidth:420,margin:"0 auto",display:"flex",flexDirection:"column"}}>
    <Hdr title="Acceso Conductores" back="home" go={go}/>
    <div style={{flex:1,padding:24,display:"flex",flexDirection:"column",gap:20}}>
      {driverLoginStep===1?(<>
        <div style={{textAlign:"center",padding:"12px 0"}}><div style={{fontSize:48,marginBottom:10}}>🚗</div><p style={{color:"white",fontWeight:800,fontSize:18}}>Acceso exclusivo conductores</p></div>
        <Card style={{display:"flex",flexDirection:"column",gap:14}}>
          <div><SL>Usuario (correo electrónico)</SL>
            <input type="email" placeholder="correo@ejemplo.com" value={driverEmail} onChange={e=>setDriverEmail(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleDriverLogin()} style={{width:"100%",background:"#2a2a2a",color:"white",border:"1px solid #374151",borderRadius:10,padding:"13px 14px",fontSize:14,outline:"none"}}/>
          </div>
          <div><SL>Contraseña</SL>
            <div style={{position:"relative"}}>
              <input type={showPwd?"text":"password"} placeholder="Contraseña" value={driverPwd} onChange={e=>setDriverPwd(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleDriverLogin()} style={{width:"100%",background:"#2a2a2a",color:"white",border:"1px solid #374151",borderRadius:10,padding:"13px 48px 13px 14px",fontSize:14,outline:"none"}}/>
              <Btn onClick={()=>setShowPwd(v=>!v)} style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",background:"none",color:"#9ca3af",fontSize:16,padding:"4px"}}>{showPwd?"🙈":"👁"}</Btn>
            </div>
          </div>
          {driverLoginError&&<div style={{background:"#2a0a0a",border:"1px solid #5a1a1a",borderRadius:8,padding:"8px 12px"}}><p style={{color:"#f87171",fontSize:12}}>⚠️ {driverLoginError}</p></div>}
          <Btn onClick={handleDriverLogin} style={{width:"100%",background:"#FFD700",color:"#111",fontWeight:800,fontSize:16,padding:"14px 0",borderRadius:12}}>Entrar →</Btn>
        </Card>
      </>):(<>
        <div style={{textAlign:"center",padding:"8px 0"}}>
          <div style={{width:52,height:52,background:"#FFD700",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,fontSize:18,margin:"0 auto 10px"}}>{driverConductorSel&&driverConductorSel.ini}</div>
          <p style={{color:"white",fontWeight:700,fontSize:17}}>Hola, {driverConductorSel&&driverConductorSel.nombre.split(" ")[0]}</p>
          <p style={{color:"#555",fontSize:13,marginTop:4}}>¿Qué vehículo conduces hoy?</p>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {VEHICULOS.map(v=>(<Btn key={v.id} onClick={()=>{setDriverSesion({conductor:driverConductorSel,vehiculo:v});setDriverLoginStep(1);setDriverConductorSel(null);setDriverEmail("");setDriverPwd("");setDriverFase("espera");go("driver_home");}}
            style={{background:"#1a1a1a",border:"2px solid #2a2a2a",borderRadius:14,padding:"13px 16px",width:"100%",textAlign:"left"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
              <div><p style={{color:"white",fontWeight:700,fontSize:14}}>{v.marca}</p><p style={{color:"#9ca3af",fontSize:12}}>{v.color} · {v.mat} · {v.plazas} plazas</p></div>
              <div style={{display:"flex",flexDirection:"column",gap:3,alignItems:"flex-end"}}>
                <Tag label={v.et} color={v.et==="0"?"#064e3b":"#1c1917"} text={v.et==="0"?"#34d399":"#a8a29e"}/>
                {!v.urbano&&<Tag label="Sin urbano" color="#450a0a" text="#fca5a5"/>}
                {v.minPrecio>0&&<Tag label={"Mín "+v.minPrecio+"€"} color="#2a1a00" text="#fbbf24"/>}
              </div>
            </div>
          </Btn>))}
          <Btn onClick={()=>{setDriverLoginStep(1);setDriverLoginError("");}} style={{color:"#555",background:"none",border:"none",textDecoration:"underline",fontSize:13}}>← Cambiar usuario</Btn>
        </div>
      </>)}
    </div>
  </div>);

  // ── DRIVER HOME
  if(sc==="driver_home"){const s=driverSesion;return(<div style={{background:"#0a0a0a",minHeight:"100vh",maxWidth:420,margin:"0 auto",display:"flex",flexDirection:"column"}}>
    <div style={{background:"#111",borderBottom:"1px solid #1f2937",display:"flex",justifyContent:"space-between",alignItems:"center",padding:14}}>
      <Btn onClick={()=>go("home")} style={{color:"#FFD700",fontSize:13,background:"none",border:"none"}}>← Cliente</Btn>
      <LogoSmall/>
    </div>
    <div style={{flex:1,overflowY:"auto",padding:16,display:"flex",flexDirection:"column",gap:12}}>
      {s&&<Card style={{border:"2px solid #FFD700"}}>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:10}}>
          <div style={{width:48,height:48,background:"#FFD700",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,fontSize:17,flexShrink:0}}>{s.conductor.ini}</div>
          <div><p style={{color:"white",fontWeight:700,fontSize:15}}>{s.conductor.nombre}</p><p style={{color:"#9ca3af",fontSize:12}}>🚗 {s.vehiculo.marca} · {s.vehiculo.mat}</p></div>
        </div>
        <Btn onClick={()=>{setDriverLoginStep(2);setDriverConductorSel(s.conductor);go("driver_login");}} style={{width:"100%",background:"#2a2a2a",color:"#9ca3af",padding:"8px 0",borderRadius:8,fontSize:12,border:"1px solid #374151"}}>🔄 Cambiar vehículo</Btn>
      </Card>}
      <Card><SL>Estado</SL>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {Object.values(ESTADOS).map(est=>(<Btn key={est.id} onClick={()=>setDriverEstado(est.id)}
            style={{display:"flex",alignItems:"center",gap:12,padding:"12px",borderRadius:10,border:"2px solid "+(driverEstado===est.id?est.color:"#2a2a2a"),background:driverEstado===est.id?est.bg:"transparent",textAlign:"left",width:"100%"}}>
            <div style={{width:14,height:14,borderRadius:"50%",background:driverEstado===est.id?est.color:"#374151",flexShrink:0}}/>
            <div><p style={{color:driverEstado===est.id?est.color:"#d1d5db",fontWeight:700,fontSize:13}}>{est.label}</p><p style={{color:"#555",fontSize:11}}>{est.desc}</p></div>
          </Btn>))}
        </div>
        <p style={{color:"#555",fontSize:11,marginTop:8}}>ℹ️ Predeterminado no disponible entre 22:00 y 08:00 h</p>
      </Card>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
        {[["🚕","7","Viajes"],["⏱️","5,5h","Horas"],["💶","642€","Ingresos"]].map(([ico,v,l])=>(<div key={l} style={{background:"#1a1a1a",border:"1px solid #2a2a2a",borderRadius:10,padding:"12px 8px",textAlign:"center"}}>
          <p style={{fontSize:20,marginBottom:2}}>{ico}</p><p style={{color:"#FFD700",fontWeight:900,fontSize:17}}>{v}</p><p style={{color:"#555",fontSize:10}}>{l}</p>
        </div>))}
      </div>
      {(driverEstado==="disponible"||driverEstado==="ocupado")&&<Btn onClick={()=>{setSolicitud(null);setDriverFase("espera");go("driver_espera");}} style={{background:"#16a34a",color:"white",fontWeight:700,fontSize:15,padding:"15px 0",borderRadius:12,width:"100%"}}>🔔 Activar recepción de servicios</Btn>}
      {driverEstado==="larga_ocup"&&<InfoBox color="#1c0e00" border="#4a3000" tc="#fb923c">En larga ocupación: solo recibes llamadas directas, no solicitudes.</InfoBox>}
      <Btn onClick={()=>go("driver_admin")} style={{background:"#1a1a1a",color:"white",border:"1px solid #2a2a2a",fontWeight:600,fontSize:14,padding:"13px 0",borderRadius:12,width:"100%"}}>📊 Panel de administración</Btn>
      <Btn onClick={()=>{setDriverSesion(null);setDriverLoginStep(1);go("home");}} style={{background:"none",color:"#555",border:"1px solid #2a2a2a",fontWeight:600,fontSize:13,padding:"10px 0",borderRadius:10,width:"100%"}}>Cerrar sesión</Btn>
    </div>
  </div>);}

  // ── DRIVER ESPERA / SOLICITUD / DEMORA / ETA
  if(sc==="driver_espera") return(<div style={{background:"#0a0a0a",minHeight:"100vh",maxWidth:420,margin:"0 auto",display:"flex",flexDirection:"column",justifyContent:"center",alignItems:"center",padding:20}}>
    {driverFase==="espera"&&<div style={{textAlign:"center"}}>
      <div style={{fontSize:64,marginBottom:20}}>📡</div>
      <p style={{color:"white",fontWeight:700,fontSize:20,marginBottom:6}}>Esperando servicios...</p>
      <p style={{color:ESTADOS[driverEstado]&&ESTADOS[driverEstado].color||"#9ca3af",fontSize:12,fontWeight:600,marginBottom:24}}>{ESTADOS[driverEstado]&&ESTADOS[driverEstado].label}</p>
      <Btn onClick={()=>go("driver_home")} style={{color:"#555",background:"none",border:"none",textDecoration:"underline"}}>Volver</Btn>
    </div>}
    {driverFase==="solicitud"&&solicitud&&<div style={{width:"100%"}}>
      <div style={{background:"#1a1a1a",border:"2px solid #FFD700",borderRadius:16,padding:18,marginBottom:14}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <p style={{color:"white",fontWeight:900,fontSize:17}}>🔔 Nuevo servicio</p>
          <span style={{color:countdown<=10?"#f87171":"#FFD700",fontWeight:900,fontSize:28}}>{countdown}s</span>
        </div>
        {[["Recogida",solicitud.origen],["Destino",solicitud.destino],["Distancia",solicitud.km+" km"],["Tarifa",solicitud.tipo],["Pasajeros",solicitud.pasajeros]].map(([k,v])=>(<div key={k} style={{display:"flex",justifyContent:"space-between",borderBottom:"1px solid #2a2a2a",padding:"7px 0"}}>
          <span style={{color:"#9ca3af",fontSize:12}}>{k}</span>
          <span style={{color:k==="Destino"?"white":"#d1d5db",fontWeight:k==="Destino"?700:500,fontSize:12,textAlign:"right",maxWidth:"60%"}}>{v}</span>
        </div>))}
        {solicitud.notas&&<p style={{color:"#fb923c",fontSize:11,marginTop:6}}>📝 {solicitud.notas}</p>}
        <div style={{marginTop:10,paddingTop:10,borderTop:"1px solid #2a2a2a"}}>
          <p style={{color:"#FFD700",fontWeight:900,fontSize:28}}>{precioMod||solicitud.precio} €</p>
          <input type="number" placeholder="Modificar precio si es necesario..." value={precioMod||""} onChange={e=>setPrecioMod(e.target.value)} style={{width:"100%",background:"#2a2a2a",color:"white",border:"1px solid #374151",borderRadius:8,padding:"8px 12px",fontSize:13,marginTop:6,outline:"none"}}/>
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
        <Btn onClick={()=>setDriverFase("eta")} style={{background:"#16a34a",color:"white",fontWeight:700,padding:"14px 0",borderRadius:12,fontSize:15}}>✓ Aceptar</Btn>
        <Btn onClick={()=>{setSolicitud(null);setDriverFase("espera");go("driver_home");}} style={{background:"#dc2626",color:"white",fontWeight:700,padding:"14px 0",borderRadius:12,fontSize:15}}>✕ Rechazar</Btn>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        <Btn onClick={()=>{setSolicitud(null);setDriverFase("espera");go("driver_home");}} style={{background:"#1e3a5f",color:"#93c5fd",fontWeight:600,padding:"12px 0",borderRadius:12,fontSize:13}}>↪️ Pasar a compañero</Btn>
        <Btn onClick={()=>setDriverFase("demora")} style={{background:"#2a1a00",color:"#fbbf24",fontWeight:600,padding:"12px 0",borderRadius:12,fontSize:13}}>⏰ Demorar</Btn>
      </div>
    </div>}
    {driverFase==="demora"&&<div style={{width:"100%",textAlign:"center"}}>
      <p style={{color:"white",fontWeight:700,fontSize:18,marginBottom:16}}>⏰ Establecer tiempo de demora</p>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:10}}>
        {["10","15","20","30","45","60"].map(t=>(<Btn key={t} onClick={()=>setDemoraTiempo(t)} style={{background:demoraTiempo===t?"#f97316":"#2a2a2a",color:demoraTiempo===t?"white":"#d1d5db",fontWeight:700,padding:"12px 0",borderRadius:10,fontSize:15}}>{t} min</Btn>))}
      </div>
      <input type="number" placeholder="Otro (min)" value={demoraTiempo} onChange={e=>setDemoraTiempo(e.target.value)} style={{width:"100%",background:"#2a2a2a",color:"white",border:"1px solid #374151",borderRadius:10,padding:"11px",fontSize:15,outline:"none",marginBottom:12,textAlign:"center"}}/>
      <Btn onClick={()=>{if(!demoraTiempo){alert("Indica el tiempo de demora");return;}setSolicitud(null);setDriverFase("espera");alert("Cliente notificado: disponible en aprox. "+demoraTiempo+" min");go("driver_home");}} style={{width:"100%",background:"#f97316",color:"white",fontWeight:700,padding:"14px 0",borderRadius:12,fontSize:15,marginBottom:8}}>📤 Notificar ({demoraTiempo||"?"} min)</Btn>
      <Btn onClick={()=>setDriverFase("solicitud")} style={{color:"#555",background:"none",border:"none",textDecoration:"underline",fontSize:13}}>← Volver</Btn>
    </div>}
    {driverFase==="eta"&&<div style={{width:"100%",textAlign:"center"}}>
      <p style={{color:"white",fontWeight:700,fontSize:18,marginBottom:4}}>🕐 ¿Cuánto tardas en llegar?</p>
      <p style={{color:"#9ca3af",fontSize:13,marginBottom:18}}>Recogida: <strong style={{color:"white"}}>{solicitud&&solicitud.origen}</strong></p>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:10}}>
        {["5","10","15"].map(t=>(<Btn key={t} onClick={()=>setEtaSel(t)} style={{background:etaSel===t?"#FFD700":"#2a2a2a",color:etaSel===t?"#111":"#d1d5db",fontWeight:900,padding:"18px 0",borderRadius:12,fontSize:22}}>{t}'</Btn>))}
      </div>
      <input type="number" placeholder="Otro (min)" value={etaSel&&!["5","10","15"].includes(etaSel)?etaSel:""} onChange={e=>setEtaSel(e.target.value)} style={{width:"100%",background:"#2a2a2a",color:"white",border:"1px solid #374151",borderRadius:10,padding:"12px",fontSize:15,outline:"none",marginBottom:10,textAlign:"center"}}/>
      {solicitud&&solicitud.reserva&&<Btn onClick={()=>setEtaSel("alli")} style={{width:"100%",background:etaSel==="alli"?"#FFD700":"#1e3a5f",color:etaSel==="alli"?"#111":"white",fontWeight:900,fontSize:18,padding:"16px 0",borderRadius:12,marginBottom:10,letterSpacing:1}}>📅 ALLÍ ESTARÉ</Btn>}
      <Btn onClick={()=>{if(!etaSel){alert("Selecciona el tiempo de llegada");return;}
        // Write to localStorage so client buscando screen picks it up
        const etaLabel=etaSel==="alli"?"ALLÍ ESTARÉ":etaSel+" min";
        try{localStorage.setItem("taxiAck",JSON.stringify({precio:parseFloat(precioMod)||solicitud?.precio||0,eta:etaLabel,conductor:driverSesion?.conductor||CONDUCTORES[0],vehiculo:driverSesion?.vehiculo||VEHICULOS[0],ts:Date.now()}));}catch(e){}
        setDriverFase("viaje");go("driver_viaje");
      }} style={{width:"100%",background:"#FFD700",color:"#111",fontWeight:800,fontSize:16,padding:"15px 0",borderRadius:12}}>✓ Confirmar y enviar al cliente</Btn>
      <Btn onClick={()=>setDriverFase("solicitud")} style={{color:"#555",background:"none",border:"none",textDecoration:"underline",marginTop:10,fontSize:13}}>← Volver</Btn>
    </div>}
  </div>);

  // ── DRIVER VIAJE
  if(sc==="driver_viaje"&&solicitud) return(<div style={{background:"#0a0a0a",minHeight:"100vh",maxWidth:420,margin:"0 auto",display:"flex",flexDirection:"column"}}>
    <div style={{background:"#15803d",padding:12,textAlign:"center"}}><p style={{color:"white",fontWeight:900,fontSize:16}}>🚕 VIAJE EN CURSO · {solicitud.destino}</p></div>
    <div style={{flex:1,padding:16,display:"flex",flexDirection:"column",gap:12}}>
      <Card>
        {[["Recogida",solicitud.origen],["Destino",solicitud.destino],["Cliente",solicitud.cliente||"María García"],["Teléfono",solicitud.tel]].map(([k,v])=>(<div key={k} style={{display:"flex",justifyContent:"space-between",borderBottom:"1px solid #2a2a2a",padding:"7px 0",gap:8}}>
          <span style={{color:"#9ca3af",fontSize:12,flexShrink:0}}>{k}</span><span style={{color:"white",fontSize:12,textAlign:"right"}}>{v}</span>
        </div>))}
        <div style={{display:"flex",justifyContent:"space-between",padding:"8px 0"}}>
          <span style={{color:"#9ca3af"}}>Precio</span>
          <span style={{color:"#FFD700",fontWeight:900,fontSize:22}}>{precioMod||solicitud.precio} €</span>
        </div>
        <div style={{background:"#0a2a1a",border:"1px solid #065f46",borderRadius:8,padding:"8px 12px"}}>
          <p style={{color:"#4ade80",fontWeight:600,fontSize:13}}>🕐 {etaSel==="alli"?"ALLÍ ESTARÉ":etaSel+" minutos"}</p>
        </div>
      </Card>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <a href={"tel:"+solicitud.tel} style={{background:"#16a34a",color:"white",fontWeight:700,padding:"14px 0",borderRadius:12,fontSize:14,textDecoration:"none",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>📞 Llamar</a>
        <Btn onClick={()=>go("driver_chat")} style={{background:"#1e3a5f",color:"#93c5fd",fontWeight:700,padding:"14px 0",borderRadius:12,fontSize:14}}>💬 Chat</Btn>
      </div>
      <Btn onClick={()=>{setDriverFase("espera");setSolicitud(null);setPrecioMod(null);setEtaSel(null);go("driver_home");}} style={{background:"#dc2626",color:"white",fontWeight:700,fontSize:15,padding:"15px 0",borderRadius:12,width:"100%"}}>✓ Finalizar · Cobrar {precioMod||solicitud.precio} €</Btn>
    </div>
  </div>);

  // ── DRIVER CHAT
  if(sc==="driver_chat") return(<div style={{background:"#0a0a0a",minHeight:"100vh",maxWidth:420,margin:"0 auto",display:"flex",flexDirection:"column"}}>
    <Hdr title={"Chat con "+(solicitud&&solicitud.cliente||"cliente")} back="driver_viaje" go={go}/>
    <div style={{flex:1,overflow:"auto",padding:16,display:"flex",flexDirection:"column",gap:8}}>
      {chatMsgs.map((m,i)=>(<div key={i} style={{display:"flex",justifyContent:m.from==="conductor"?"flex-end":m.from==="sistema"?"center":"flex-start"}}>
        {m.from==="sistema"?<p style={{color:"#555",fontSize:11,background:"#1a1a1a",padding:"4px 10px",borderRadius:10}}>{m.texto}</p>:(
          <div style={{maxWidth:"75%",background:m.from==="conductor"?"#FFD700":"#1a1a1a",borderRadius:14,padding:"10px 12px"}}>
            <p style={{color:m.from==="conductor"?"#111":"white",fontSize:14}}>{m.texto}</p>
            <p style={{color:m.from==="conductor"?"#555":"#6b7280",fontSize:10,marginTop:3,textAlign:"right"}}>{m.hora}</p>
          </div>
        )}
      </div>))}
      <div ref={chatEndRef}/>
    </div>
    <div style={{background:"#111",borderTop:"1px solid #1f2937",padding:12,display:"flex",gap:10}}>
      <input type="text" placeholder="Escribe un mensaje..." value={chatInput} onChange={e=>setChatInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&enviarChat("conductor")} style={{flex:1,background:"#2a2a2a",color:"white",border:"1px solid #374151",borderRadius:24,padding:"10px 16px",fontSize:14,outline:"none"}}/>
      <Btn onClick={()=>enviarChat("conductor")} style={{background:"#FFD700",color:"#111",width:44,height:44,borderRadius:"50%",fontWeight:900,fontSize:18,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>→</Btn>
    </div>
  </div>);

  // ── TURISMO (Itinerario turístico — sin precios, panel de planificación)
  if(sc==="turismo"){
    const[paradas,setParadas]=React.useState([{lugar:"",horaLlegada:"",horaVisita:"",notas:""}]);
    const[fechaItin,setFechaItin]=React.useState("");
    const[paxItin,setPaxItin]=React.useState(1);
    const addParada=()=>setParadas(p=>[...p,{lugar:"",horaLlegada:"",horaVisita:"",notas:""}]);
    const delParada=i=>setParadas(p=>p.filter((_,j)=>j!==i));
    const updParada=(i,k,v)=>setParadas(p=>p.map((x,j)=>j===i?{...x,[k]:v}:x));
    return(<div style={{background:"#0a0a0a",minHeight:"100vh",maxWidth:420,margin:"0 auto",display:"flex",flexDirection:"column"}}>
      <Hdr title="🍷 Itinerario Turístico" back="home" go={go}/>
      <div style={{flex:1,overflowY:"auto",padding:16,display:"flex",flexDirection:"column",gap:12}}>
        <div style={{background:"linear-gradient(135deg,#1a1200,#2a1800)",border:"1px solid #4a3000",borderRadius:14,padding:16}}>
          <p style={{color:"#FFD700",fontWeight:800,fontSize:17,marginBottom:4}}>🍷 Ribera del Duero</p>
          <p style={{color:"#d4a017",fontSize:13}}>Diseña tu ruta personalizada por bodegas y lugares de interés. Nuestro conductor te acompañará a tu ritmo.</p>
        </div>
        <Card>
          <SL>Datos del itinerario</SL>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
            <div>
              <p style={{color:"#555",fontSize:11,marginBottom:4}}>FECHA</p>
              <input type="date" value={fechaItin} onChange={e=>setFechaItin(e.target.value)} style={{width:"100%",background:"#2a2a2a",color:"white",border:"1px solid #374151",borderRadius:8,padding:"8px 10px",fontSize:13,outline:"none"}}/>
            </div>
            <div>
              <p style={{color:"#555",fontSize:11,marginBottom:4}}>PERSONAS</p>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <Btn onClick={()=>setPaxItin(n=>Math.max(1,n-1))} style={{width:34,height:34,borderRadius:"50%",background:"#2a2a2a",color:"white",fontSize:18,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center"}}>−</Btn>
                <span style={{color:"white",fontWeight:900,fontSize:18,minWidth:20,textAlign:"center"}}>{paxItin}</span>
                <Btn onClick={()=>setPaxItin(n=>Math.min(7,n+1))} style={{width:34,height:34,borderRadius:"50%",background:"#FFD700",color:"#111",fontSize:18,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center"}}>+</Btn>
              </div>
            </div>
          </div>
        </Card>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <p style={{color:"white",fontWeight:700,fontSize:15}}>Paradas del itinerario</p>
          <Btn onClick={addParada} style={{background:"#1a1a1a",color:"#FFD700",border:"1px solid #FFD700",padding:"7px 14px",borderRadius:8,fontSize:13,fontWeight:600}}>+ Añadir parada</Btn>
        </div>
        {paradas.map((p,i)=>(<div key={i} style={{background:"#1a1a1a",border:"1px solid #2a2a2a",borderRadius:12,padding:14,position:"relative"}}>
          <div style={{position:"absolute",top:-10,left:12,background:"#FFD700",color:"#111",width:22,height:22,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,fontSize:12}}>{i+1}</div>
          {paradas.length>1&&<Btn onClick={()=>delParada(i)} style={{position:"absolute",top:10,right:10,background:"rgba(239,68,68,.15)",color:"#f87171",border:"none",borderRadius:"50%",width:28,height:28,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14}}>✕</Btn>}
          <div style={{marginTop:6}}>
            <p style={{color:"#555",fontSize:11,marginBottom:4}}>BODEGA / LUGAR A VISITAR</p>
            <input type="text" placeholder="Ej: Bodega Portia, Museo del Vino..." value={p.lugar} onChange={e=>updParada(i,"lugar",e.target.value)} style={{width:"100%",background:"#2a2a2a",color:"white",border:"1px solid #374151",borderRadius:8,padding:"10px 12px",fontSize:14,outline:"none",marginBottom:10}}/>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
            <div>
              <p style={{color:"#555",fontSize:11,marginBottom:4}}>HORA LLEGADA</p>
              <input type="time" value={p.horaLlegada} onChange={e=>updParada(i,"horaLlegada",e.target.value)} style={{width:"100%",background:"#2a2a2a",color:"white",border:"1px solid #374151",borderRadius:8,padding:"8px 10px",fontSize:13,outline:"none"}}/>
            </div>
            <div>
              <p style={{color:"#555",fontSize:11,marginBottom:4}}>TIEMPO DE VISITA</p>
              <select value={p.horaVisita} onChange={e=>updParada(i,"horaVisita",e.target.value)} style={{width:"100%",background:"#2a2a2a",color:"white",border:"1px solid #374151",borderRadius:8,padding:"8px 10px",fontSize:13,outline:"none"}}>
                <option value="">Seleccionar...</option>
                {["30 min","1 hora","1,5 horas","2 horas","2,5 horas","3 horas","4 horas","Día completo"].map(o=><option key={o} value={o}>{o}</option>)}
              </select>
            </div>
          </div>
          <div>
            <p style={{color:"#555",fontSize:11,marginBottom:4}}>NOTAS (opcional)</p>
            <input type="text" placeholder="Reserva previa, cata incluida..." value={p.notas} onChange={e=>updParada(i,"notas",e.target.value)} style={{width:"100%",background:"#2a2a2a",color:"white",border:"1px solid #374151",borderRadius:8,padding:"8px 10px",fontSize:13,outline:"none"}}/>
          </div>
        </div>))}
        <InfoBox color="#1a2a1a" border="#2d5a2d" tc="#86efac">El precio del servicio se calculará en función del recorrido y se comunicará antes de confirmar la reserva.</InfoBox>
        <a href={"tel:"+EMPRESA.tel} style={{display:"block",background:"#FFD700",color:"#111",fontWeight:800,fontSize:16,padding:"15px 0",borderRadius:12,textAlign:"center",textDecoration:"none"}}>📞 Solicitar itinerario · {EMPRESA.telFmt}</a>
      </div>
    </div>);
  }

  // ── TARIFAS
  if(sc==="tarifas") return(<div style={{background:"#0a0a0a",minHeight:"100vh",maxWidth:420,margin:"0 auto",display:"flex",flexDirection:"column"}}>
    <Hdr title="Tarifas 2026" back="home" go={go}/>
    <div style={{flex:1,overflowY:"auto",padding:16,display:"flex",flexDirection:"column",gap:12}}>
      <InfoBox color="rgba(255,215,0,0.06)" border="rgba(255,215,0,0.2)" tc="#FFD700">BOCYL nº 234/2025 · 4 dic 2025 · Vigente desde 1 enero 2026</InfoBox>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        {[{t:"☀️ Diurna",r:T.dia},{t:"🌙 Nocturna",r:T.noc}].map(({t,r})=>(<Card key={t}><p style={{color:"white",fontWeight:700,fontSize:12,marginBottom:8}}>{t}</p>
          {[["Por km",r.km.toFixed(2)+" €"],["Mínimo",r.min.toFixed(2)+" €"],["Espera/h",r.espH.toFixed(2)+" €"],["Espera 15'",r.esp15.toFixed(2)+" €"]].map(([k,v])=>(<div key={k} style={{display:"flex",justifyContent:"space-between",borderBottom:"1px solid #2a2a2a",padding:"5px 0",fontSize:12}}><span style={{color:"#9ca3af"}}>{k}</span><span style={{color:"#FFD700",fontWeight:700}}>{v}</span></div>))}
        </Card>))}
      </div>
      {[{t:"🏙️ Urbanos (Aranda de Duero)",items:[["Urbano corto (≤4km)","6 € / 7 €"],["Urbano largo (estación, polígono...)","7 € / 8 €"],["Precio","Día / Noche"]]},
        {t:"💵 Pago",items:[["≤ 10€","Efectivo, Bizum o tarjeta"],["> 10€","Solo Bizum o tarjeta (pago previo)"]]},
        {t:"🌙 Horario nocturno",items:[["Lunes–viernes","20:00–7:00 h"],["Sábados","Todo el día"],["Domingos y festivos","Todo el día"]]}
      ].map(sec=>(<Card key={sec.t}><p style={{color:"white",fontWeight:700,marginBottom:8}}>{sec.t}</p>
        {sec.items.map(([k,v])=>(<div key={k} style={{display:"flex",justifyContent:"space-between",borderBottom:"1px solid #2a2a2a",padding:"6px 0",fontSize:12}}><span style={{color:"#9ca3af"}}>{k}</span><span style={{color:"#FFD700",fontWeight:600,textAlign:"right",maxWidth:"55%"}}>{v}</span></div>))}
      </Card>))}
      <Card><p style={{color:"white",fontWeight:700,marginBottom:6}}>💳 Bizum</p>
        <p style={{color:"#FFD700",fontWeight:900,fontSize:22,letterSpacing:2}}>{EMPRESA.telFmt}</p>
        <p style={{color:"#555",fontSize:11,marginTop:3}}>Concepto: TAXI</p>
      </Card>
    </div>
  </div>);

  // ── ADMIN
  if(sc==="driver_admin") return(<div style={{background:"#0a0a0a",minHeight:"100vh",maxWidth:420,margin:"0 auto",display:"flex",flexDirection:"column"}}>
    <Hdr title="Administración" back="driver_home" go={go}/>
    <div style={{flex:1,overflowY:"auto",padding:16,display:"flex",flexDirection:"column",gap:12}}>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        {[["🚕","23","Viajes hoy","#FFD700"],["💶","642 €","Ingresos","#4ade80"],["👩‍✈️","2/2","Conductoras","#60a5fa"],["📅","4","Reservas pend.","#c084fc"]].map(([ico,v,l,c])=>(<Card key={l}><p style={{fontSize:22,marginBottom:4}}>{ico}</p><p style={{color:c,fontWeight:900,fontSize:22}}>{v}</p><p style={{color:"#555",fontSize:11}}>{l}</p></Card>))}
      </div>
      <Card><p style={{color:"white",fontWeight:700,marginBottom:10}}>Últimos servicios</p>
        {[["21:34","Aer. Madrid","246 €","Tarjeta"],["20:15","Valladolid","154 €","Bizum"],["19:02","ITV","8 €","Efectivo"],["18:40","Gumiel de Izán","17 €","Bizum"],["17:55","Burgos","131 €","Tarjeta"]].map(([h,d,i,p])=>(<div key={h+d} style={{display:"flex",alignItems:"center",borderBottom:"1px solid #2a2a2a",padding:"7px 0",gap:6}}>
          <span style={{color:"#555",fontSize:11,width:40,flexShrink:0}}>{h}</span>
          <span style={{color:"white",fontSize:12,flex:1}}>{d}</span>
          <span style={{color:"#FFD700",fontSize:12,fontWeight:700}}>{i}</span>
          <span style={{color:"#6b7280",fontSize:10,width:44,textAlign:"right"}}>{p}</span>
        </div>))}
      </Card>
      <Card><p style={{color:"white",fontWeight:700,marginBottom:8}}>Política de cancelación</p>
        <p style={{color:"#86efac",fontSize:12,marginBottom:3}}>✅ +7 días → reembolso 70%</p>
        <p style={{color:"#f87171",fontSize:12}}>❌ ≤7 días → sin reembolso</p>
      </Card>
    </div>
  </div>);

  return null;
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
